<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1, maximum-scale=1">
  <title>BACKROOMS GAME</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    @font-face {
      font-family: 'Gothic';
      src: url('fonts/fuente10.ttf') format('truetype');
      font-display: swap;
    }

    html {
      background-color: black;
    }
  </style>
</head>

<body>

  <!-- --------------CONFIGURACIONES ------------------ -->

  <button class="configuraciones" onclick="abrirConfig()">AJUSTES</button>
  <div class="container-config" style="display: none;">
    <button id="expandirPantalla" class="configuraciones" onclick="ampliar()"></button>
  </div>

  <!-- -------------- PANTALLA DE MALVENIDA ------------------ -->

  <div class="container-start" hidden>
    <h1 id="msg-malvenida" class="central">MALVENIDO <br> A <br> BACKROOMS</h1>
    <button onclick="jugar()" class="central"><strong> JUGAR </strong><br> (se ampliara y rotara la pantalla al
      iniciar)</button>
  </div>

  <!-- -------------- BOTONES MOVILES ------------------ -->

  <div class="container-buttons" hidden>
    <div id="joystick">
      <div id="ballJoystick">&nbsp;</div>
    </div>
    <!-- <button id="disparador">X</button> -->
  </div>
  <canvas id="canvas" hidden></canvas>
  <script src="js/main.js" type="module"></script>
<script src="js/controls/buttonsPc.js" type="module"></script>
<script src="js/controls/buttonsAndroid.js" type="module"></script>
<script src="js/ui/setting.js" type="module"></script>
</body>

</html>
